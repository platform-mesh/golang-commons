name: ci
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  pipe:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    uses: platform-mesh/.github/.github/workflows/pipeline-golang-module.yml@79135654f57b80714eac4a27467c95ff24af6046 # main
    secrets: inherit
    with:
      useLocalCoverageConfig: true

