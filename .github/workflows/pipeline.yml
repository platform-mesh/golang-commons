name: ci
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  pipe:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    uses: platform-mesh/.github/.github/workflows/pipeline-golang-module.yml@25ad1e92b63a6d272599ab386d4ead982edc3851 # main
    secrets: inherit
    with:
      useLocalCoverageConfig: true

